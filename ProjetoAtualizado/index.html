<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Principal - Lost Found</title>

    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/styleIndex.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
    <div id="container">

        <header>
            <div class="logo-area">
                <img src="img/WhatsApp_Image_2026-04-13_at_14.41.10-removebg-preview.png" id="logo">
                <h1>LOST FOUND</h1>
            </div>
        </header>

        <div id="search-container">
            <input type="text" id="buscar" placeholder="Buscar item...">
        </div>

        <div id="col">

            <div id="col1">
                <p>Especificações</p>

                <span>Região</span>
                <select id="gra">
                    <option value="">Todas</option>
                    <option value="Bloco 1">Bloco 1</option>
                    <option value="Bloco 2">Bloco 2</option>
                    <option value="Bloco 3">Bloco 3</option>
                    <option value="Bloco 4">Bloco 4</option>
                    <option value="CentroAcademido">Centro Acadêmico</option>
                    <option value="BlocoDaIndusria">Bloco da Industria</option>
                    <option value="RA">RA</option>
                    <option value="Cantina">Cantina</option>
                    <option value="Quadra">Quadra</option>
                </select>

                <span>Categoria</span>
                <select id="in">
                    <option value="">Todas</option>
                    <option value="Roupa">Roupa</option>
                    <option value="Garrafa">Garrafa</option>
                    <option value="Acessorios">Acessorios</option>
                    <option value="Eletronicos">Eletronicos</option>
                    <option value="Cartões">Cartões</option>
                    <option value="Livros">Livros</option>
                    <option value="Chave">Chave</option>
                </select>

                <span>Marca</span>
                <input id="marca" type="text">

                <button id="btn">Buscar</button>
            </div>

            <div id="col2"></div>

        </div>

        <footer>
            <ul>
                <li>
                    <a href="index.html">
                        <i class="material-icons ativo">home</i>
                    </a>
                </li>
                <li>
                    <a href="intermediaria.html">
                        <i class="material-icons">add</i>
                    </a>
                </li>
                <li>
                    <a href="perfil.html">
                        <i class="material-icons">person</i>
                    </a>
                </li>
                <li>
                    <a href="sobre.html">
                        <i class="material-icons">info</i>
                    </a>
                </li>
            </ul>
        </footer>
    </div>

<script>
async function carregarItens() {
    try {
        const busca = document.getElementById('buscar').value.trim();
        const local = document.getElementById('gra').value;
        const categoria = document.getElementById('in').value;
        const marca = document.getElementById('marca').value;

        const box = document.getElementById('col2');

        // 🚫 NÃO buscar se tudo estiver vazio
        if (!busca && !local && !categoria && !marca) {
            box.innerHTML = '';
            return;
        }

        const url = `http://localhost:3000/items?busca=${busca}&local=${local}&categoria=${categoria}&marca=${marca}`;

        const resposta = await fetch(url);
        const itens = await resposta.json();

        box.innerHTML = '';

        // ❌ nenhum resultado
        if (itens.length === 0) {
            box.innerHTML = '<p style="color:white;">Nenhum item encontrado.</p>';
            return;
        }

        // ✅ criar cards
        itens.forEach(item => {
            const card = document.createElement('div');
            card.classList.add('card');

            let midia = '';

            if (item.imagem) {
                const urlArquivo = 'http://localhost:3000/uploads/' + item.imagem;

                if (item.imagem.endsWith('.pdf')) {
                    midia = `
                        <div class="pdf-box">
                            <p>📄 PDF anexado</p>
                            <a href="${urlArquivo}" target="_blank">Abrir PDF</a>
                        </div>
                    `;
                } else {
                    midia = `<img src="${urlArquivo}">`;
                }
            } else {
                midia = `<img src="https://via.placeholder.com/300">`;
            }

            card.innerHTML = `
                <div class="card-img">
                    ${midia}
                </div>

                <div class="card-body">
                    <h3>${item.title || 'Sem título'}</h3>

                    <p class="local">📍 ${item.location || '—'}</p>

                    <p>${item.description || 'Sem descrição'}</p>

                    <div class="card-footer">
                        <span>${item.categoria || 'Outros'}</span>
                        <span>${item.marca || '—'}</span>
                    </div>
                </div>
            `;

            box.appendChild(card);
        });

    } catch (erro) {
        console.error('Erro ao carregar itens:', erro);
    }
}

// 🔍 delay (não spammar o servidor)
let timeout;

function buscarComDelay() {
    clearTimeout(timeout);

    timeout = setTimeout(() => {
        carregarItens();
    }, 400);
}

// 🎯 eventos
document.getElementById('buscar').addEventListener('input', buscarComDelay);
document.getElementById('marca').addEventListener('input', buscarComDelay);

document.getElementById('gra').addEventListener('change', carregarItens);
document.getElementById('in').addEventListener('change', carregarItens);

document.getElementById('btn').addEventListener('click', carregarItens);

// 🚀 NÃO carregar automático (IMPORTANTE)
// carregarItens(); ← REMOVIDO de propósito
</script>

</body>
</html>
