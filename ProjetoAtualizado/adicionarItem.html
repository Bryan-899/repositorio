<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar item Encontrado</title>
    <link rel="stylesheet" href="CSS/styleAddItem.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div id="container">
        <header>
            <div class="logo-area">
            <img src="img/WhatsApp_Image_2026-04-13_at_14.41.10-removebg-preview.png" alt="Lost Found" id="logo">
            <h1>LOST & FOUND</h1>
            </div>
            <p>Cadastrar Item Encontrado </p>
        </header>
        <div id="col">
            <div id="col1">
                
                <label for="iptImagem" id="upload">Clique para adicionar foto 📸</label>
                    <input type="file" id="iptImagem" style="display: none;">
                    <textarea id="descricao" name="descricao" style="resize:none;" rows="8" cols="60" placeholder="Descrição"></textarea>
            </div>
            <div id="col2">
                <label for="iptCategoria">Categoria:</label>
                 <select id="iptCategoria">
                    <option value="" disabled selected hidden>Opções</option>
                    <option value="Roupa">Roupa</option>
                    <option value="Garrafa">Garrafa</option>
                    <option value="Acessorios">Acessorios</option>
                    <option value="Eletronicos">Eletronicos</option>
                    <option value="Cartões">Cartões</option>
                    <option value="Livros">Livros</option>
                    <option value="Chave">Chave</option>
                </select>
                <br>

                <label for="iptMarca">Marca:</label>
                    <input id="iptMarca" type="text">
                <br>

                <label for="iptLocal">Local onde foi encotrado:</label>
                <select id="iptLocal">
                    <option value="" disabled selected hidden>Opções</option>
                    <option value="Bloco 1">Bloco 1</option>
                    <option value="Bloco 2">Bloco 2</option>
                    <option value="Bloco 3">Bloco 3</option>
                    <option value="Bloco 4">Bloco 4</option>
                    <option value="CentroAcademico">Centro Academido</option>
                    <option value="BlocoDaIndustria">Bloco da Industria</option>
                    <option value="RA">RA</option>
                    <option value="Cantina">Cantina</option>
                    <option value="Quadra">Quadra</option>
                </select>
                <br>

                <label for="iptData">Data encotrada:</label>
                    <input id="iptData" type="date">
                <br>

                <label for="iptNome">Nome de quem encontrou:</label>
                    <input id="iptNome" type="text">
                <br>

                 <label>Informações de Contato</label>
                    <input type="text" id="contato" placeholder="Telefone ou WhatsApp">
                <br>
                
                

                <button onclick="enviarItem()">Enviar</button>
            </div>
        </div>
        <footer>
            <ul>
                <li>
                    <a href="index.html">
                        <i class="material-icons">home</i>
                    </a>
                </li>
                <li>
                    <a href="intermediaria.html">
                        <i class="material-icons ativo">add</i>
                    </a>
                </li>

                <li>
                    <a href="perfil.html">
                        <i class="material-icons">person</i>
                    </a>
                </li>

                <li>
                    <a href="sobre.html">
                        <i class="material-icons">info</i>
                    </a>
                </li>
            </ul>
        </footer>
    </div>
    <script>
async function enviarItem() {
    const formData = new FormData();

    formData.append('title', document.getElementById('iptNome').value);
    formData.append('cor', document.getElementById('iptCor').value);
    formData.append('data', document.getElementById('iptData').value);
    formData.append('marca', document.getElementById('iptMarca').value);
    formData.append('dataFab', document.getElementById('iptDataFab').value);
    formData.append('categoria', document.getElementById('iptCategoria').value);
    formData.append('description', document.getElementById('descricao').value);
    formData.append('location', document.getElementById('iptLocal').value);
    formData.append('type', 'achado');
    formData.append('user_id', 1);

    // 📸 imagem
    const imagem = document.getElementById('iptImagem').files[0];
    formData.append('imagem', imagem);

    try {
        const resposta = await fetch('http://localhost:3000/items', {
            method: 'POST',
            body: formData
        });

        const dataResposta = await resposta.json();
        console.log(dataResposta);

        alert('Item cadastrado com imagem!');
    } catch (erro) {
        console.error(erro);
        alert('Erro ao enviar item');
    }
}
const input = document.getElementById('iptImagem');
const upload = document.getElementById('upload');

input.addEventListener('change', function () {
    const file = this.files[0];

    if (file) {
        const url = URL.createObjectURL(file);
        upload.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
    }
});
</script>
</body>
</html>
